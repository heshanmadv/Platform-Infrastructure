; Single-node cluster today: one Raspberry Pi acting as the k3s server with
; workload scheduling enabled on itself. Add more Pis under [k3s_agents]
; later (as k3s-agent nodes) without changing this structure.

[k3s_server]
pi-master ansible_host=192.168.1.50 ansible_user=pi

[k3s_agents]
; pi-agent1 ansible_host=192.168.1.51 ansible_user=pi
; pi-agent2 ansible_host=192.168.1.52 ansible_user=pi

; k3s_cluster groups server + agents together so roles/common applies to
; every node regardless of how many agents exist.
[k3s_cluster:children]
k3s_server
k3s_agents
